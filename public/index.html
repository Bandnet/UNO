<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>UNO Online</title>
<link rel="stylesheet" href="style.css" />
</head>
<body>

<div id="screen-lobby" class="screen">
  <div class="card-panel">
    <h1>🎴 UNO Online</h1>
    <p class="subtitle">Free, no accounts, just you and your friends.</p>

    <div class="tabs">
      <button class="tab-btn active" data-tab="create">Create Room</button>
      <button class="tab-btn" data-tab="join">Join Room</button>
    </div>

    <div id="tab-create" class="tab-content active">
      <label>Your name</label>
      <input id="create-name" maxlength="20" placeholder="e.g. Alex" />

      <h3>House rules</h3>
      <label class="checkbox"><input type="checkbox" id="rule-seven" /> 7-0 rule (7 = swap hands, 0 = rotate all hands)</label>
      <label for="rule-stack-mode">Stacking mode</label>
      <select id="rule-stack-mode">
        <option value="off">Off</option>
        <option value="loose" selected>Loose stacking (+2 on +2, +4 on +4/+2)</option>
        <option value="strict">Strict stacking (+2 on +2, +4 on +4 only)</option>
      </select>
      <label class="checkbox"><input type="checkbox" id="rule-jump" /> Jump-in (play an identical card out of turn)</label>
      <label class="checkbox"><input type="checkbox" id="rule-drawuntil" /> Draw until playable</label>

      <button id="btn-create" class="primary">Create Room</button>
    </div>

    <div id="tab-join" class="tab-content">
      <label>Your name</label>
      <input id="join-name" maxlength="20" placeholder="e.g. Sam" />
      <label>Room code</label>
      <input id="join-code" maxlength="4" placeholder="e.g. K7QM" style="text-transform:uppercase" />
      <button id="btn-join" class="primary">Join Room</button>
    </div>

    <p id="lobby-error" class="error"></p>
  </div>
</div>

<div id="screen-waiting" class="screen hidden">
  <div class="card-panel">
    <h2>Room <span id="wait-code"></span></h2>
    <p class="subtitle">Share this code with your friends</p>
    <ul id="wait-players"></ul>
    <button id="btn-start" class="primary">Start Game</button>
    <p class="hint">Need at least 2 players.</p>
  </div>
</div>

<div id="screen-game" class="screen hidden">
  <div class="table" id="game-table">
    <div id="fx-layer" aria-hidden="true"></div>
    <div class="opponents" id="opponents"></div>

    <div class="center">
      <div class="pile deck" id="deck-pile" title="Draw a card">
        <div class="card back"></div>
        <span id="deck-count" class="count"></span>
      </div>
      <div class="pile discard" id="discard-pile"></div>
      <div id="turn-indicator" class="turn-indicator"></div>
    </div>

    <div class="hand-area">
      <div id="my-name" class="my-name"></div>
      <div id="hand" class="hand"></div>
      <div class="actions">
        <button id="btn-uno" class="uno-btn">UNO!</button>
        <button id="btn-pass" class="secondary hidden">Pass</button>
      </div>
    </div>
  </div>

  <div class="side-panel">
    <div id="log" class="log"></div>
    <div class="chat">
      <div id="chat-log" class="chat-log"></div>
      <div class="chat-input">
        <input id="chat-text" placeholder="Say something..." maxlength="300" />
        <button id="chat-send">Send</button>
      </div>
    </div>
  </div>
</div>

<div id="color-modal" class="modal hidden">
  <div class="modal-content">
    <h3>Choose a color</h3>
    <div class="color-choices">
      <button data-color="red" class="color-choice red"></button>
      <button data-color="yellow" class="color-choice yellow"></button>
      <button data-color="green" class="color-choice green"></button>
      <button data-color="blue" class="color-choice blue"></button>
    </div>
  </div>
</div>

<div id="swap-modal" class="modal hidden">
  <div class="modal-content">
    <h3>Swap hands with...</h3>
    <div id="swap-choices" class="swap-choices"></div>
  </div>
</div>

<div id="win-modal" class="modal hidden">
  <div class="modal-content">
    <h2 id="win-text"></h2>
    <button id="btn-back-lobby" class="primary">Back to lobby</button>
  </div>
</div>

<script src="/socket.io/socket.io.js"></script>
<script src="client.js"></script>
</body>
</html>
